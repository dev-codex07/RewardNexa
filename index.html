<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RewardNexa - Auto Reward</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>
<body style="background:#000; color:#fff; text-align:center; padding-top:50px;">
    <p id="msg">Loading Video Ad...</p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        const AdController = window.Adsgram.init({ blockId: "27173" });

        window.onload = () => {
            AdController.show().then((result) => {
                // SUCCESS: Ad poora dekha gaya
                // Bot ko data bhejo taaki points add ho sakein
                tg.sendData("ad_completed_10"); 
                tg.close(); 
            }).catch((result) => {
                // ERROR ya SKIP: Bina points ke close kar do
                alert("Ad skip kiya ya error aaya!");
                tg.close();
            });
        };
    </script>
</body>
</html>
